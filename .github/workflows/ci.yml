name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.2"
            laravel: "11"
            testbench: "^9.0"
            illuminate: "^11.0"
          - php: "8.3"
            laravel: "12"
            testbench: "^10.0"
            illuminate: "^12.0"
          - php: "8.4"
            laravel: "13"
            testbench: "^11.0"
            illuminate: "^13.0"
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Pin Laravel lane dependencies
        run: |
          composer require --dev --no-interaction --no-update orchestra/testbench:${{ matrix.testbench }}
          composer require --no-interaction --no-update \
            illuminate/contracts:${{ matrix.illuminate }} \
            illuminate/support:${{ matrix.illuminate }} \
            illuminate/http:${{ matrix.illuminate }}

      - name: Update lock for lane
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Lint check
        run: composer lint-check

      - name: Static analysis
        run: composer analyse

      - name: Tests
        run: composer test
